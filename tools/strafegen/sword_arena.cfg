// ============================================================
// STRAFE 64 — SWORD ARENA  (melee variant of the arena mode)
//   exec sword_arena
//
// Katana bullet-time melee vs sword-only Assassins. Loads the arena
// map, latches the blade ruleset, then layers the shared ARENA preset
// (effects + audio-reactive trails) on top. The ranged twin is arena_vg.
// ============================================================

// --- pure blade: rail off, bots stripped to the katana ---
seta g_botSwordOnly  1         // Assassins fight with the katana only
seta bot_swordBlock  1         // Assassins parry incoming cuts (reactive + anticipatory)
bind 1 "weapon 11"             // katana on slot 1 (WP_SWORD)

exec arena                     // shared effects + audio trails + bullet-time

// --- latch the blade ruleset, then load the arena (applies the latch) ---
seta g_vectorgun     0         // no speed-rail: melee only
bot_enable 1
seta g_gametype 0              // FFA
map strafe64dm_1337
wait 80                       // let the map finish loading before spawning bots
addbot Assassin 4 free 400
addbot Assassin 4 free 1100
addbot Assassin 4 free 1800
addbot Assassin 4 free 2500

echo "^4SWORD ARENA^7 — bullet-time blade. Hunt the Assassins."
