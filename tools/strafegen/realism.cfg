// ============================================================
// STRAFE 64 — REALISM preset (the house render path)
//
// The surrealist-brutalist / Bryce-3D look: GL2 (rend2) renderer
// with a directional sun + cascaded shadow maps, a filmic tonemap
// with crushed blacks, normal/specular/relief-parallax materials,
// HDR + a fixed cinematic exposure, and crisp trilinear+anisotropic
// textures. This is the inverse of psx.cfg and ships by default
// (run.sh applies it unless you pass -p for the legacy PSX look).
//
//   exec realism.cfg        apply the look (does a vid_restart)
//
// Render-cvar values mirror tools/strafegen/strafegen_gfx.render_cfg()
// so a directly-booted map (<name>_gfx.cfg) and this global preset agree.
// ============================================================

seta cl_renderer     opengl2         // rend2 / GL2 path — PBR, shadows, HDR, tonemap

// ---- texture quality (the inverse of the PSX crunch) ----
seta r_psx           0               // no affine warp — perspective-correct mapping
seta r_textureMode   GL_LINEAR_MIPMAP_LINEAR   // trilinear — smooth, no texel crunch
seta r_ext_texture_filter_anisotropic 1
seta r_ext_max_anisotropy 16         // sharp grazing-angle concrete
seta r_picmip        0               // full-resolution textures
seta r_texturebits   32
seta r_colorbits     32
seta r_depthbits     24
seta r_ext_multisample 4             // MSAA on — clean edges, not PSX jaggies
seta r_vertexLight   0               // lit path (sun + exactVertex), not vertex-only
seta r_overBrightBits   0            // the tonemap owns exposure now, not overbright
seta r_mapOverBrightBits 0

// ---- directional sun + cascaded shadows (q3gl2_sun in the sky shader) ----
seta r_sunShadows    1
seta r_sunlightMode  1
seta r_forceSunAmbientScale 0.45     // deep shaded sides; brutalist contrast
seta r_shadowFilter  2               // soft PCF — hides residual cascade stair-step
seta r_shadowMapSize 4096            // crisp shadows at ~2800u arena scale

// ---- filmic contrast: crushed blacks, hard white point (no flat grey wash) ----
seta r_hdr           1
seta r_toneMap       1
seta r_forceToneMap  1
seta r_forceToneMapMin -5.5
seta r_forceToneMapAvg -2.1
seta r_forceToneMapMax  0.1
seta r_autoExposure  0               // fixed exposure: moody, lets bloom/neon carry
seta r_cameraExposure 0.55

// ---- PBR-lite surface depth on greebled / hull panels ----
seta r_normalMapping   1
seta r_specularMapping 1
seta r_parallaxMapping 2             // 2 = relief mapping — real depth on hull
seta r_ssao            0             // quarter-res SSAO blocks up on big flats — off

seta cg_speedFov     1               // dynamic FOV stays — it's gameplay, not render-fi

vid_restart
echo "STRAFE 64 :: REALISM preset engaged (brutalist / Bryce GL2)"
