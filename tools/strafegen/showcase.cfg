// ============================================================
// STRAFE 64 — SHOWCASE preset (the "make it gorgeous" config)
//
// The deliberate opposite of psx.cfg: instead of crunching the look
// down to PlayStation lo-fi, this pushes the GL2 renderer's full
// post-processing stack — HDR + filmic tonemap + bloom + eye
// adaptation + anisotropy + MSAA — and cranks every gameplay effect
// (sword trails, blood, ragdoll, speed lines, flow juice) to "demo".
//
// Renderer cvars are ARCHIVE/read-at-GL-init, so showcase.sh passes
// them on the command line at boot. This file applies the LIVE half:
// the gameplay ruleset + effect intensities + HUD. Re-run any time:
//     /exec showcase
// ============================================================

// ---- Canonical gameplay ruleset (speed=damage, sword bullet-time,
//      hot floor, flow regen, void). Staged alongside by showcase.sh.
exec strafe64

// ---- Cranked effects: blade --------------------------------------
set cg_swordTrailAlpha   "0.9"    // bright ribbon arc behind every cut (def 0.5)

// ---- Cranked effects: gore + bodies ------------------------------
set cg_ragdoll           "1"      // Verlet ragdoll corpses
set cg_ragdollIterations "12"     // stiffer, less jittery settle for the camera
set cg_bloodSpurt        "1"      // arterial spray on every hit
set cg_bloodSpurtTime    "1400"   // lingering arcs
set cg_bloodPool         "1"      // spreading ground pools under the fallen
set cg_bloodTime         "12000"  // decals stick around for the shot

// ---- Cranked effects: motion + projectiles -----------------------
set cg_speedLines        "1"      // radial rush lines at speed
set cg_speedFov          "1"      // FOV breathes with velocity, punches on flow
set cg_bulletTrail       "1"      // amber/cyan bolt trails
set cg_bulletTrailWidth  "2.5"    // fatter, more readable streaks

// ---- HUD: NERV/MAGI readouts on ----------------------------------
set cg_drawSpeed         "1"      // speedometer + sync + hop streak + vignette
set cg_draw2D            "1"
set cg_drawGun           "1"

// ---- Bullet-time tuned for SHOW, not sweat -----------------------
// A touch slower floor + slower ramp than canonical so the freeze reads
// on camera; swing still surges time so cuts stay crisp.
set g_timeBind           "1"
set g_timeBindMin        "0.06"
set g_timeBindFire       "0.85"

// ---- Cinematic depth of field, racked by bullet-time -------------
// r_dof allocates the depth buffer at load (latched-ish), so it's set here.
// cg_dofBulletTime ramps the blur from cg_dofBase (full speed: crisp) to
// cg_dofMax (deep slow-mo: dreamy), auto-focusing on screen centre so the
// duel target stays sharp. Tune cg_dofMax to taste.
set r_dof                "1"
set r_dofFocalRange      "420"
set cg_dofBulletTime     "1"
set cg_dofBase           "0"
set cg_dofMax            "12"
set cg_dofFocusTrace     "1"   // focus tracks the NEAREST real surface under the reticle, eased

// ---- Audio-reactive world: let the music warp the shaders --------
// au_* envelopes are driven by the engine music analyser; nothing to
// set here, but make sure the soundtrack is loud enough to drive them.
set s_volume             "0.9"
set s_musicvolume        "0.8"

echo "^5STRAFE 64 :: SHOWCASE preset engaged ^7— bloom + bullet-time + full gore"
