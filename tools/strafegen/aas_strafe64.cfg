//===========================================================================
// BSPC (bot AAS compiler) configuration for STRAFE 64.
//
// bspc's built-in DefaultCfg() leaves the physics fields at FLT_MAX, so jump
// reachabilities across gaps come out garbage and bots stall at every gap
// (gap-free arenas still work on plain walk reachabilities; linear courses
// don't). This passes REAL values, tuned to the mod's enhanced moveset so the
// AAS believes the bots can cross what they actually can:
//   phys_gravity 1000 / phys_jumpvel 400 : modded gravity + a jump height
//       that accounts for the double-jump's extra reach
//   phys_maxvelocity 600                 : bots bhop well past run speed, so
//       gaps are crossed at speed, not at 320
//   rs_maxjumpfallheight 600             : reduced fall damage lets bots
//       commit to bigger drops
// strafegen.compile_aas passes this via `bspc -cfg`.
//===========================================================================

#define PRESENCE_NONE				1
#define PRESENCE_NORMAL				2
#define PRESENCE_CROUCH				4

bbox	//30x30x56
{
	presencetype	PRESENCE_NORMAL
	flags			0x0000
	mins			{-15, -15, -24}
	maxs			{15, 15, 32}
} //end bbox

bbox	//30x30x40
{
	presencetype	PRESENCE_CROUCH
	flags			0x0001
	mins			{-15, -15, -24}
	maxs			{15, 15, 16}
} //end bbox

settings
{
	phys_gravitydirection		{0, 0, -1}
	phys_friction				6
	phys_stopspeed				100
	phys_gravity				1000
	phys_waterfriction			1
	phys_watergravity			400
	phys_maxvelocity			600
	phys_maxwalkvelocity		600
	phys_maxcrouchvelocity		100
	phys_maxswimvelocity		150
	phys_walkaccelerate			10
	phys_airaccelerate			1
	phys_swimaccelerate			4
	phys_maxstep				18
	phys_maxsteepness			0.7
	phys_maxwaterjump			19
	phys_maxbarrier				33
	phys_jumpvel				400
	phys_falldelta5				40
	phys_falldelta10			60
	rs_waterjump				400
	rs_teleport					50
	rs_barrierjump				100
	rs_startcrouch				300
	rs_startgrapple				500
	rs_startwalkoffledge		70
	rs_startjump				300
	rs_rocketjump				500
	rs_bfgjump					500
	rs_jumppad					250
	rs_aircontrolledjumppad		300
	rs_funcbob					300
	rs_startelevator			50
	rs_falldamage5				300
	rs_falldamage10				500
	rs_maxjumpfallheight		600
} //end settings
