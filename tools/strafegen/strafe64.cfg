// ============================================================
// STRAFE 64 — canonical gameplay ruleset
//
// One annotated board for every movement-mod cvar. Sets the shipped
// defaults explicitly, so this doubles as documentation and as a
// "reset to canonical" you can exec after experimenting:
//     /exec strafe64
//
// Values here mirror the in-code defaults (g_main.c / cg_main.c). The
// movement physics constants themselves live in bg_pmove.c and aren't
// cvars — see MOVEMENT.md for those.
// ============================================================

// ---- Combat: speed = damage --------------------------------
// Your velocity scales the damage you deal. 1.0x at run speed (320 ups),
// +50% per extra run speed, capped. Near-still bottoms out at 0.85x.
set g_speedDamage      "1"     // master toggle for speed-scaled damage + accuracy
set g_speedDamageMax   "2.0"   // multiplier cap (reached at ~960 ups)
set g_speedKnockback   "1"     // fast hits also launch harder (same curve)
set g_selfDamageScale  "0.25"  // self-damage scale — cheap rocket jumps, full kick

// ---- Survival: keep moving ---------------------------------
set g_hotFloor         "1"     // idling on the ground at low speed burns you
set g_flowRegen        "3"     // sustained flow (>=500 ups) heals this/sec to 100
set g_killReward       "1"     // +25 health / +10 armor per frag
set g_ammoRegen        "1"     // +this/sec per owned weapon, up to 50

// ---- Movement tools ----------------------------------------
set g_grapple          "1"     // everyone spawns with the swing grapple (slot 10)

// ---- Time-bind: the sword game -----------------------------
// SUPERHOT-style world clock tied to your movement. Stand still and time
// almost stops (0.05x) — survey the frozen room, line up the cut; move or
// SWING and time surges back to life. The void + race clock stay on REAL
// time (stopping is never safe; slow-mo can't cheat the timer), and
// pmove_fixed is forced while active so air control feels identical fast or
// slow. This is the core feel now — melee/sword-driven bullet-time.
set g_timeBind         "1"     // 0 = raw realtime movement (no dilation)
set g_timeBindMin      "0.05"  // timescale when fully still — near-freeze
set g_timeBindMax      "1.0"   // timescale at full movement intent
set g_timeBindRef      "700"   // horizontal speed (ups) counted as full intent
set g_timeBindCurve    "1.5"   // intent->time exponent (>1 = stays slow longer)
set g_timeBindFire     "0.8"   // attacking surges time (keeps the swing crisp)
set g_timeBindSmooth   "8"     // ease-DOWN rate settling into the freeze
set g_timeBindRise     "30"    // ramp-UP rate when you move — a step snaps time
                               // to life (kept faster than Smooth, asymmetric)
set g_timeBindLog      "1"     // 1 = geometric "Matrix" curve, 0 = linear

// ---- HUD / feedback ----------------------------------------
set cg_drawSpeed       "1"     // speedometer + multiplier + hop streak, vignette, hit marker
set cg_speedFov        "1"     // FOV widens with speed; punches on the flow surge

// ---- Latched (need a map reload to take effect) ------------
set g_voidRise         "1"     // rising void kill-plane (per-map voidrise scales it)
set g_vectorgun        "0"     // 1 = rail fire-rate scales with speed (the Vectorgun)

echo "STRAFE 64 ruleset loaded — speed is everything."
