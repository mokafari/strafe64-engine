// ============================================================
// STRAFE 64 — VECTORGUN ARENA  (ranged variant of the arena mode)
//   exec arena_vg
//
// The speed-scaled rail — the Vectorgun — vs rail-toting Assassins.
// Fire rate, damage and spread all scale with your speed, so the gun is
// only as good as your movement. Loads the arena map, latches the
// vectorgun ruleset, then layers the shared ARENA preset on top. The
// melee twin is sword_arena.
// ============================================================

// --- speed-rail for everyone; bots keep their guns (not sword-only) ---
seta g_botSwordOnly  0         // Assassins fight with the rail, not the blade
bind 1 "weapon 7"              // railgun on slot 1 (WP_RAILGUN = the vectorgun)

exec arena                     // shared effects + audio trails + bullet-time

// --- latch the vectorgun ruleset, then load the arena (applies the latch) ---
seta g_vectorgun     1         // 1 = rail fire-rate/damage/spread scale with speed
bot_enable 1
seta g_gametype 0              // FFA
map strafe64dm_1337
wait 80                       // let the map finish loading before spawning bots
addbot Assassin 4 free 400
addbot Assassin 4 free 1100
addbot Assassin 4 free 1800
addbot Assassin 4 free 2500

echo "^4VECTORGUN ARENA^7 — speed is the trigger. Hunt the Assassins."
