// ============================================================
// STRAFE 64 — PSX preset (phase 1: cvar-level low-fi)
//
// Crunchy point-sampled textures, 16-bit color banding, no AA,
// vertex lighting. The real wobble (vertex jitter / affine warp /
// dithered framebuffer) lands in the phase-2 engine renderer pass.
//
//   exec psx.cfg            apply the look (then vid_restart)
// ============================================================

seta cl_renderer     opengl1         // fixed-function path (affine warp opt-in lives here)
seta r_psx           0               // affine texture warp — OFF by default; too harsh on
                                     // STRAFE 64's big flat polys. set 1 for the full wobble.
seta r_textureMode   GL_NEAREST     // point sampling — PSX texel crunch
seta r_picmip        2              // low-res model/weapon textures
seta r_texturebits   16             // 16-bit texture banding
seta r_colorbits     16             // 16-bit framebuffer banding
seta r_depthbits     16
seta r_ext_multisample 0            // kill antialiasing — keep the jaggies
seta r_vertexLight   1              // vertex lighting only, no lightmaps
seta r_overBrightBits 0
seta r_mapOverBrightBits 2          // punchy contrast like a CRT
seta r_intensity     1.1
seta r_finish        1
seta r_swapInterval  1
seta cg_speedFov     1             // dynamic FOV plays into the rush

vid_restart
echo "STRAFE 64 :: PSX preset engaged"
