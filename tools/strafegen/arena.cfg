// ============================================================
// STRAFE 64 — ARENA  (the canonical combat-arena preset)
//
// Bullet-time duelling vs Assassin bots across the velodrome and the
// floating revector platforms. Time crawls when you're still and surges
// when you move or fire, so every kill is a SUPERHOT dance.
//
// This file is WEAPON-AGNOSTIC on purpose: the launcher latches either
// the katana (sword arena) or the speed-scaled rail (vectorgun arena)
// BEFORE the map loads — here we only dress the arena with the full
// effect stack + the audio-reactive speed-trails and tune the clock for
// the duel. No map, no bots, no g_vectorgun here, so it layers cleanly
// over either variant (or over a live match):
//
//   exec arena         // effects + trails on whatever match is running
//   exec sword_arena   // full melee arena   (map + Assassins + this)
//   exec arena_vg      // full vectorgun arena (map + Assassins + this)
// ============================================================

// ---- SUPERHOT clock: deep freeze when still, surge when you move/fire
seta g_timeBind        1
seta g_timeBindMin     0.04    // near-freeze floor (duel 0.02 .. show 0.06)
seta g_timeBindMax     1.0
seta g_timeBindFire    0.85    // attacking surges time so the hit reads crisp
seta g_timeBindLog     1       // geometric "Matrix" curve

// ---- speed = lethality: commit to movement for bigger hits ----
seta g_speed           320
seta g_speedDamage     1
seta g_speedDamageMax  2.0

// ---- audio-reactive speed-trails on every fighter (visual, no damage)
seta cg_arenaTrails    1       // bots + you leave flowing trails
seta cg_latticeGlitch  0.35    // visible NEON datamosh (additive shader: blooms, never black)
seta cg_latticeAudio   1.4     // trails PUMP with the DnB bands
seta cg_latticeWave    1.3     // wall-top rides the music amplitude -> flow
seta cg_musicShuffle   1       // random DnB track per load

// ---- full effect stack: gore + bodies -------------------------
seta cg_swordTrailAlpha   0.9  // bright ribbon arc behind every cut
seta cg_ragdoll           1    // Verlet ragdoll corpses
seta cg_ragdollIterations 12   // stiffer, less jittery settle for the camera
seta cg_bloodSpurt        1    // arterial spray on every hit
seta cg_bloodSpurtTime    1400 // lingering arcs
seta cg_bloodPool         1    // spreading ground pools under the fallen
seta cg_bloodTime         12000

// ---- full effect stack: motion + projectiles ------------------
seta cg_speedLines       1     // radial rush lines at speed
seta cg_speedFov         1     // FOV breathes with velocity, punches on flow
seta cg_bulletTrail      1     // amber/cyan bolt trails (the vectorgun rail)
seta cg_bulletTrailWidth 2.5   // fatter, more readable streaks

// ---- HUD: NERV/MAGI readouts on -------------------------------
seta cg_drawSpeed      1       // speedometer + sync + hop streak + vignette
seta cg_draw2D         1
seta cg_drawGun        1       // show the weapon

// ---- audio loud enough to drive the au_* music envelopes ------
seta s_volume          0.9
seta s_musicvolume     0.8

echo "^4ARENA^7 — bullet-time duel. Audio-reactive trails live."
